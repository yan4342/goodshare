# Recommendation Service Properties
recommendation.service.url=http://localhost:5000

# DeepSeek API Properties
deepseek.api.key=sk-8301d6961e9043aaafcf09a10ff4c7ee
deepseek.api.url=https://api.deepseek.com/chat/completions
