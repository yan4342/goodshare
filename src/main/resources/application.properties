
# MySQL Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/goodshare?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Docker Compose support
spring.docker.compose.enabled=false

# App Properties
app.jwtSecret=your-super-secret-key-that-is-long-and-secure-enough
app.jwtExpirationInMs=86400000

# Elasticsearch Properties
spring.elasticsearch.uris=http://localhost:9200

# Taobao API Properties
taobao.api.url=https://eco.taobao.com/router/rest
taobao.api.appkey=your-app-key
taobao.api.secret=your-app-secret

# Recommendation Service Properties
recommendation.service.url=http://localhost:5000
